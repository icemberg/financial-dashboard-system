# ── Test-only configuration ──────────────────────────────────────────────────
# Uses an in-memory H2 database so @SpringBootTest can boot without MySQL.

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ── JWT (test values) ────────────────────────────────────────────────────────
app.jwt.secret=dG9rZW5TZWNyZXRLZXlGb3Jab3J2eW5GaW5hbmNlRGFzaGJvYXJkU3lzdGVtITIwMjQ=
app.jwt.expiration-ms=86400000

# ── OAuth2 (dummy – not exercised in unit tests) ─────────────────────────────
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
spring.security.oauth2.client.registration.google.scope=email,profile

# ── App properties ───────────────────────────────────────────────────────────
app.oauth2.redirect-uri=http://localhost:3000/oauth2/callback
app.cors.allowed-origins=http://localhost:3000

# ── Mail (disabled for tests) ────────────────────────────────────────────────
spring.mail.host=localhost
spring.mail.port=25
app.mail.from-address=noreply@test.local
app.mail.password-reset-base-url=http://localhost:3000/reset-password
