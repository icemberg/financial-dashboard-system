
spring.datasource.url=jdbc:mysql://localhost:3306/finance_dashboard
spring.datasource.username=root
spring.datasource.password=abhi@2004
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# In future we should store all the credentials in AWS Secrets Manager and fetch from there instead of hardcoding in properties file

# In production we have to add separate credentials that is username and password that should be accessed by ADMIN or DBA only and not by developers.

# JPA properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ── JWT Configuration ────────────────────────────────────────────────────────
# Secret must be at least 256 bits (32 bytes) when base64-decoded for HS256.
# IMPORTANT: Replace this in production with a cryptographically secure random value.
app.jwt.secret=dG9rZW5TZWNyZXRLZXlGb3Jab3J2eW5GaW5hbmNlRGFzaGJvYXJkU3lzdGVtITIwMjQ=
app.jwt.expiration-ms=86400000

# ── Google OAuth2 Configuration ──────────────────────────────────────────────
# 1. Go to https://console.cloud.google.com
# 2. Create a project → APIs & Services → Credentials → OAuth 2.0 Client IDs
# 3. Add authorized redirect URI: http://localhost:8080/login/oauth2/code/google
# 4. Paste the client-id and client-secret below
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile

# Frontend URL to redirect to after Google login (token appended as ?token=<JWT>)
app.oauth2.redirect-uri=http://localhost:3000/oauth2/callback

# ── CORS Configuration ────────────────────────────────────────────────────────
# Comma-separated list of origins allowed to call the API from a browser.
# localhost:3000 → React (Create React App / Next.js dev server)
# localhost:5173 → Vite dev server
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ── Mail (SMTP) Configuration ────────────────────────────────────────────────
# Using Gmail SMTP as a local dev default. Replace host/port/credentials for
# other providers (Mailtrap, Mailhog, SendGrid, AWS SES, etc.).
# For Gmail: enable 2FA → create an App Password at https://myaccount.google.com/apppasswords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_EMAIL@gmail.com
spring.mail.password=YOUR_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── App Mail Settings ────────────────────────────────────────────────────────
app.mail.from-address=noreply@zorvyn.local
app.mail.password-reset-base-url=http://localhost:3000/reset-password