# In future we should store all the credentials in AWS Secrets Manager and fetch from there instead of hardcoding in properties file

# In production we have to add separate credentials that is username and password that should be accessed by ADMIN or DBA only and not by developers.

# JPA properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ── JWT Configuration ────────────────────────────────────────────────────────
# Secret must be at least 256 bits (32 bytes) when base64-decoded for HS256.
# IMPORTANT: Replace this in production with a cryptographically secure random value.
app.jwt.secret=dG9rZW5TZWNyZXRLZXlGb3Jab3J2eW5GaW5hbmNlRGFzaGJvYXJkU3lzdGVtITIwMjQ=
app.jwt.expiration-ms=86400000

# ── Google OAuth2 Configuration ──────────────────────────────────────────────
# 1. Go to https://console.cloud.google.com
# 2. Create a project → APIs & Services → Credentials → OAuth 2.0 Client IDs
# 3. Add authorized redirect URI: http://localhost:8080/login/oauth2/code/google
# 4. Paste the client-id and client-secret below
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile

# Frontend URL to redirect to after Google login (token appended as ?token=<JWT>)
app.oauth2.redirect-uri=http://localhost:3000/oauth2/callback