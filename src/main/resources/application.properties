spring.application.name=zorvyn

# ── Active Profile ────────────────────────────────────────────────────────────
# Bug #5 fix: do NOT hardcode spring.profiles.active here.
#
# Set the active profile via environment variable or CLI arg instead:
#   Local dev:   SPRING_PROFILES_ACTIVE=local   (or IDE run configuration)
#   Production:  SPRING_PROFILES_ACTIVE=prod     (set on server / ECS / K8s)
#   CLI:         java -jar zorvyn.jar --spring.profiles.active=prod
#
# If no profile is set, Spring Boot defaults to the base application.properties
# only — which has no datasource, so the app will fail fast with a clear error.


spring.profiles.active=@active@

