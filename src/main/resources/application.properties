spring.application.name=zorvyn

# ── Active Profile ────────────────────────────────────────────────────────────
# Defaults to 'local' for developer convenience.
# In production, override via environment variable (takes precedence):
#   SPRING_PROFILES_ACTIVE=prod   (set on server / ECS / K8s)
# Or via CLI:
#   java -jar zorvyn.jar --spring.profiles.active=prod
spring.profiles.active=local
