# ══════════════════════════════════════════════════════════════════════════════
# Zorvyn Finance Dashboard — PRODUCTION Configuration
# ══════════════════════════════════════════════════════════════════════════════
#
# SECURITY RULES:
#   1. NEVER hardcode credentials here. All sensitive values must come from
#      environment variables or AWS Secrets Manager.
#   2. This file is safe to commit — it contains only references, not values.
#   3. Set env vars on your server / ECS task definition / Kubernetes secret.
#
# Required environment variables:
#   DB_URL          → jdbc:mysql://<host>:3306/finance_dashboard
#   DB_USERNAME     → database username (ADMIN/DBA access only)
#   DB_PASSWORD     → database password
#   JWT_SECRET      → base64-encoded HS256 key, at least 256 bits (32 bytes)
#   GOOGLE_CLIENT_ID     → from Google Cloud Console
#   GOOGLE_CLIENT_SECRET → from Google Cloud Console
#   CORS_ALLOWED_ORIGINS → comma-separated list of allowed frontend origins
#   OAUTH2_REDIRECT_URI  → production frontend OAuth2 callback URL
#   MAIL_HOST            → SMTP server host (e.g. smtp.gmail.com, email-smtp.us-east-1.amazonaws.com)
#   MAIL_PORT            → SMTP port (587 for STARTTLS, 465 for SSL)
#   MAIL_USERNAME        → SMTP username or IAM access key
#   MAIL_PASSWORD        → SMTP password or IAM secret
#   MAIL_FROM_ADDRESS    → sender email (e.g. noreply@zorvyn.com)
#   PASSWORD_RESET_BASE_URL → frontend reset page (e.g. https://app.zorvyn.com/reset-password)
# ══════════════════════════════════════════════════════════════════════════════

# ── Datasource ──────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Connection Pool (HikariCP) ───────────────────────────────────────────────
# Tune based on expected concurrent users and DB instance capacity.
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
# IMPORTANT: 'validate' — never use 'update' or 'create' in production.
# Schema changes must always go through a migration tool (Flyway / Liquibase).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── JWT Configuration ────────────────────────────────────────────────────────
# Must be at least 256 bits (32 bytes) when base64-decoded for HS256.
# Generate with: openssl rand -base64 32
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# ── Google OAuth2 Configuration ──────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# ── CORS Configuration ────────────────────────────────────────────────────────
# Example: https://app.zorvyn.com,https://www.zorvyn.com
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# ── OAuth2 Redirect URI ───────────────────────────────────────────────────────
# Must be an HTTPS URL in production.
# Example: https://app.zorvyn.com/oauth2/callback
app.oauth2.redirect-uri=${OAUTH2_REDIRECT_URI}

# ── Logging ──────────────────────────────────────────────────────────────────
# Reduce log noise in production. Use WARN for root, INFO for application code.
logging.level.root=WARN
logging.level.com.financedashboard.zorvyn=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN

# ── Actuator (Health Checks) ─────────────────────────────────────────────────
# Only expose health endpoint publicly. All management endpoints are locked otherwise.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── Mail (SMTP) Configuration ────────────────────────────────────────────────
# Required environment variables:
#   MAIL_HOST     → SMTP server host (e.g. smtp.gmail.com, email-smtp.us-east-1.amazonaws.com)
#   MAIL_PORT     → SMTP port (587 for STARTTLS, 465 for SSL)
#   MAIL_USERNAME → SMTP username / IAM access key
#   MAIL_PASSWORD → SMTP password / IAM secret
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── App Mail Settings ────────────────────────────────────────────────────────
#   MAIL_FROM_ADDRESS           → e.g. noreply@zorvyn.com
#   PASSWORD_RESET_BASE_URL     → e.g. https://app.zorvyn.com/reset-password
app.mail.from-address=${MAIL_FROM_ADDRESS}
app.mail.password-reset-base-url=${PASSWORD_RESET_BASE_URL}
